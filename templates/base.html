<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EvalIQ{% endblock %}</title>

    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom styling -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Header / Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom" style="padding: 16px 24px; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.15);">
        <div class="container-fluid p-0">
            <a class="navbar-brand brand" href="{{ url_for('index') }}">
                <span class="gradient-text">EvalIQ</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item me-3">
                        <a class="nav-link {% if request.path == '/' or request.path == '/preview' %}active{% endif %}" href="{{ url_for('index') }}">
                            <i class="fa-solid fa-cloud-arrow-up me-1"></i> Single Mode
                        </a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link {% if request.path == '/bulk' %}active{% endif %}" href="{{ url_for('bulk') }}">
                            <i class="fa-solid fa-people-group me-1"></i> Bulk Mode
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="{{ url_for('history') }}">
                            <i class="fa-solid fa-clock-rotate-left me-1"></i> Past Evaluations
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container my-5 flex-grow-1">
        {% block content %}{% endblock %}
    </div>

    <!-- Reusable Splash / Loading Screen Overlay -->
    <div id="evaliq-splash-screen" class="splash-overlay" style="display: none;">
        <div class="splash-content text-center px-4 w-100" style="max-width: 450px;">

            <!-- Title -->
            <h1 class="display-3 fw-bold gradient-text mb-2" style="letter-spacing: -0.5px;">EvalIQ</h1>
            <!-- Tagline / Dynamic Status -->
            <p id="splash-tagline" class="text-secondary fs-5 mb-4">AI-Powered Answer Sheet Evaluation</p>
            
            <!-- Progress Bar (shown only for bulk processing) -->
            <div id="splash-progress-container" class="mb-4 w-100" style="display: none;">
                <div class="progress bg-dark" style="height: 6px; border-radius: 3px;">
                    <div id="splash-progress-bar" class="progress-bar bg-primary" role="progressbar" style="width: 0%;"></div>
                </div>
                <div class="d-flex justify-content-between text-secondary small mt-1">
                    <span id="splash-progress-left">Evaluating sheets...</span>
                    <span id="splash-progress-percent">0%</span>
                </div>
            </div>

            <!-- Spinner -->
            <div class="splash-spinner-container">
                <div class="splash-spinner"></div>
            </div>
        </div>
        <!-- Developer Credits -->
        <div id="splash-credits" class="splash-credits text-secondary text-center">
            Developed by Muralidhar & Rohindh
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer py-3 mt-auto border-top border-secondary" style="background: rgba(9, 13, 22, 0.6); backdrop-filter: blur(8px);">
        <div class="container text-center">
            <span class="text-secondary small">
                Developed by <strong class="text-light">Muralidhar</strong> & <strong class="text-light">Rohindh</strong>
            </span>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
